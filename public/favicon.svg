<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#2C2C2E"/>
    </linearGradient>
    <!-- 弧线渐变 -->
    <linearGradient id="arc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.9)"/>
    </linearGradient>
    <!-- 红点发光 -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C83232" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C83232" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- 极淡的装饰弧线（最外层） -->
  <path d="M 80 432 C 80 237 237 80 432 80" 
        stroke="rgba(255,255,255,0.04)" stroke-width="48" fill="none" stroke-linecap="round"/>

  <!-- 主弧线 —— 赛车弯道 -->
  <path d="M 100 412 C 100 240 240 100 412 100" 
        stroke="url(#arc)" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- 红点发光效果 -->
  <circle cx="412" cy="100" r="56" fill="url(#glow)"/>

  <!-- 红色圆点 —— 赛车位置 -->
  <circle cx="412" cy="100" r="26" fill="#C83232"/>
  
  <!-- 红点内高光 -->
  <circle cx="406" cy="94" r="8" fill="rgba(255,255,255,0.3)"/>
</svg>